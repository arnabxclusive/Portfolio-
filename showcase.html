
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arnab dutta — live showcase</title>
<style>
  :root{
    --bg:#f4f4f2;--ink:#0a0a0a;--mut:#8a8a86;--line:rgba(10,10,10,.10);
    --alu1:#f2f3f4;--alu2:#d6d8db;--alu3:#a9abae;--alu4:#7c7e81;--screen:#050506;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;cursor:none}
  a,button{cursor:none}

  .mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;filter:blur(60px)}
  .blob{position:absolute;border-radius:50%;opacity:.55;will-change:transform;mix-blend-mode:multiply}
  .b1{width:46vw;height:46vw;left:-6vw;top:-8vw;background:radial-gradient(circle at 30% 30%,#ffd9c2,#ffb38a 60%,transparent 72%)}
  .b2{width:42vw;height:42vw;right:-8vw;top:6vw;background:radial-gradient(circle at 60% 40%,#cfe0ff,#a9c4ff 58%,transparent 72%)}
  .b3{width:40vw;height:40vw;left:18vw;bottom:-14vw;background:radial-gradient(circle at 50% 50%,#e7d4ff,#c9b0ff 58%,transparent 72%)}
  .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.5;
    background:radial-gradient(120% 120% at 50% 0%,transparent 55%,rgba(0,0,0,.05))}

  .stage{position:fixed;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .scene{perspective:2200px;width:min(86vw,940px);transform:translateY(1vh)}
  .macbook{position:relative;transform-style:preserve-3d;transform:rotateX(8deg);will-change:transform}

  .lid{position:relative;width:100%;aspect-ratio:16/10.3;border-radius:18px;padding:11px;
    background:linear-gradient(160deg,#3a3b3e,#1b1c1e 60%,#0c0c0e);
    box-shadow:0 2px 0 rgba(255,255,255,.08) inset,0 -1px 0 rgba(0,0,0,.6) inset,0 50px 90px -34px rgba(20,20,30,.55);
    transform-origin:bottom center}
  .bezel{position:relative;width:100%;height:100%;border-radius:9px;background:#000;
    box-shadow:0 0 0 1px #000,0 0 0 2px rgba(255,255,255,.05);overflow:hidden}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:16%;height:1.7%;min-height:6px;background:#000;border-radius:0 0 7px 7px;z-index:6}
  .cam{position:absolute;top:.55%;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#3a3a44,#0a0a0c 70%);z-index:7}
  .screen{position:absolute;inset:0;overflow:hidden;background:var(--screen)}
  .imgstack{position:absolute;inset:0}
  .shot{position:absolute;top:0;left:0;width:100%;height:auto;display:block;opacity:0;will-change:transform,opacity}
  .glass{position:absolute;inset:0;z-index:5;pointer-events:none;
    background:linear-gradient(120deg,rgba(255,255,255,.12),rgba(255,255,255,0) 24%,rgba(255,255,255,0) 78%,rgba(255,255,255,.05));
    mix-blend-mode:screen;opacity:.45}

  .deck{position:relative;width:100%;height:0;transform-style:preserve-3d}
  .hinge{position:relative;margin:0 auto;width:99%;height:9px;background:linear-gradient(180deg,#9a9c9f,#c6c8cb 40%,#e6e7e9);
    border-radius:0 0 4px 4px;transform:translateY(-1px) rotateX(74deg);transform-origin:top center;box-shadow:0 10px 22px -8px rgba(0,0,0,.35)}
  .base{position:relative;margin:0 auto;width:100%;height:20px;transform:rotateX(74deg);transform-origin:top center;
    background:linear-gradient(180deg,var(--alu1),var(--alu3) 55%,var(--alu4));
    border-radius:3px 3px 12px 12px / 3px 3px 26px 26px;
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset,0 70px 70px -26px rgba(30,30,40,.4)}
  .notchcut{position:absolute;top:0;left:50%;transform:translateX(-50%);width:24%;height:7px;background:var(--alu4);border-radius:0 0 8px 8px}
  .foot{position:absolute;bottom:-3px;width:90%;left:5%;height:6px;background:linear-gradient(180deg,#8b8d90,#5d5f62);filter:blur(.3px);border-radius:0 0 10px 10px}
  .floorshadow{position:absolute;left:50%;bottom:-9%;transform:translateX(-50%);width:80%;height:46px;border-radius:50%;
    background:radial-gradient(ellipse at center,rgba(40,40,55,.30),transparent 70%);filter:blur(8px);z-index:-1}

  /* top bar: brand left, actions right */
  .top{position:fixed;top:0;left:0;right:0;z-index:4;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;pointer-events:none}
  .nav{pointer-events:auto;display:flex;align-items:center;gap:14px;padding:10px 18px;border-radius:999px;
    background:rgba(255,255,255,.55);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);
    border:1px solid rgba(255,255,255,.6);box-shadow:0 8px 30px -12px rgba(0,0,0,.18)}
  .nav b{font-weight:600;font-size:13px;letter-spacing:.02em}
  .nav .sep{width:1px;height:14px;background:var(--line)}
  .nav span{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut)}

  .cta{pointer-events:auto;display:flex;align-items:center;gap:10px}
  .sc-btn{position:relative;overflow:hidden;text-decoration:none;border-radius:999px;
    font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
    display:inline-flex;align-items:center;gap:.5rem;
    transition:all .5s cubic-bezier(.22,1,.36,1);will-change:transform}
  .sc-primary{padding:.62rem 1.15rem;background:rgba(10,10,10,.88);color:rgba(255,255,255,.96);
    border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(0,0,0,.28),0 8px 24px rgba(0,0,0,.22)}
  .sc-primary:hover{background:rgba(28,28,28,.92);transform:translateY(-3px) scale(1.03);box-shadow:0 16px 40px rgba(0,0,0,.26)}
  .sc-primary .chev{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.18);transition:transform .4s}
  .sc-primary:hover .chev{transform:translateX(3px);background:rgba(255,255,255,.3)}
  .sc-resume{padding:.62rem 1.25rem;background:rgba(255,255,255,.5);color:var(--ink);
    border:1px solid rgba(255,255,255,.86);backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.98),0 4px 16px rgba(0,0,0,.08)}
  .sc-resume:hover{background:rgba(255,255,255,.82);transform:translateY(-3px) scale(1.03);box-shadow:0 14px 36px rgba(0,0,0,.1)}

  .caption{position:fixed;left:0;right:0;bottom:84px;z-index:4;text-align:center;pointer-events:none}
  .cap-eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
  .cap-name{font-size:clamp(20px,3.2vw,30px);font-weight:600;letter-spacing:-.01em;transition:opacity .25s}

  .dots{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);z-index:4;display:flex;gap:9px;
    padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.5);backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.55)}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(10,10,10,.18);transition:all .3s}
  .dot.on{background:var(--ink);width:22px;border-radius:4px}

  .hint{position:fixed;bottom:46px;right:28px;z-index:4;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--mut);display:flex;align-items:center;gap:8px;animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
  .hint.gone{opacity:0;transition:opacity .5s}

  .cur-dot,.cur-ring{position:fixed;top:0;left:0;z-index:50;pointer-events:none;border-radius:50%;mix-blend-mode:difference}
  .cur-dot{width:7px;height:7px;background:#fff;transform:translate(-50%,-50%)}
  .cur-ring{width:34px;height:34px;border:1px solid rgba(255,255,255,.85);transform:translate(-50%,-50%);transition:width .2s,height .2s}

  .driver{position:relative;z-index:1}

  @media (max-width:760px){
    .top{flex-direction:column;align-items:center;gap:10px;padding:14px}
    .scene{width:92vw;transform:translateY(6vh)}
    .caption{bottom:108px}.hint{display:none}.blob{opacity:.5}
  }
  @media (max-width:760px){ body{cursor:auto} a,button{cursor:auto} .cur-dot,.cur-ring{display:none} }
  @media (prefers-reduced-motion:reduce){.hint{animation:none}}
</style>
</head>
